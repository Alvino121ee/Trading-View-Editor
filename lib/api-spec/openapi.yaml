openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ZS MT5 Bridge API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: monitor
    description: Signal monitoring dashboard
  - name: ea
    description: EA reporting and analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /monitor/signals:
    get:
      operationId: listMonitorSignals
      tags: [monitor]
      summary: Get recent signals for dashboard
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Signal list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalListResponse"

  /monitor/summary:
    get:
      operationId: getMonitorSummary
      tags: [monitor]
      summary: Get aggregate stats and active signal
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorSummaryResponse"

  /mt5/result/{id}:
    post:
      operationId: setSignalResult
      tags: [monitor]
      summary: EA melaporkan hasil trade (win/loss/breakeven)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                secret:
                  type: string
                result:
                  type: string
                  enum: [win, loss, breakeven]
                close_price:
                  type: number
                pnl:
                  type: number
                close_reason:
                  type: string
              required:
                - result
      responses:
        "200":
          description: Result recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  signal:
                    $ref: "#/components/schemas/Signal"
                required:
                  - ok
                  - signal

  /ea/reports:
    get:
      operationId: listEaReports
      tags: [ea]
      summary: Get recent EA event reports
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: EA report list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EaReportListResponse"

  /ea/analytics:
    get:
      operationId: getEaAnalytics
      tags: [ea]
      summary: Get aggregated EA performance analytics
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EaAnalyticsResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Signal:
      type: object
      properties:
        id:
          type: integer
        action:
          type: string
        symbol:
          type: string
        lot:
          type: ["string", "null"]
        entry:
          type: ["string", "null"]
        sl:
          type: ["string", "null"]
        tp1:
          type: ["string", "null"]
        tp2:
          type: ["string", "null"]
        tp3:
          type: ["string", "null"]
        setup:
          type: ["string", "null"]
        comment:
          type: ["string", "null"]
        status:
          type: string
        mt5Ticket:
          type: ["integer", "null"]
        result:
          type: ["string", "null"]
        closePrice:
          type: ["string", "null"]
        pnl:
          type: ["string", "null"]
        closeReason:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        executedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - id
        - action
        - symbol
        - status
        - createdAt
        - updatedAt

    SignalListResponse:
      type: object
      properties:
        ok:
          type: boolean
        signals:
          type: array
          items:
            $ref: "#/components/schemas/Signal"
      required:
        - ok
        - signals

    MonitorStats:
      type: object
      properties:
        total:
          type: integer
        pending:
          type: integer
        sent:
          type: integer
        executed:
          type: integer
        cancelled:
          type: integer
        expired:
          type: integer
      required:
        - total
        - pending
        - sent
        - executed
        - cancelled
        - expired

    SignalResults:
      type: object
      properties:
        win:
          type: integer
        loss:
          type: integer
        breakeven:
          type: integer
        total:
          type: integer
        winRate:
          type: ["number", "null"]
        totalPnl:
          type: number
      required:
        - win
        - loss
        - breakeven
        - total
        - totalPnl

    MonitorSummaryResponse:
      type: object
      properties:
        ok:
          type: boolean
        stats:
          $ref: "#/components/schemas/MonitorStats"
        results:
          $ref: "#/components/schemas/SignalResults"
        active:
          type: ["object", "null"]
          $ref: "#/components/schemas/Signal"
        lastTrade:
          type: ["object", "null"]
          $ref: "#/components/schemas/Signal"
      required:
        - ok
        - stats
        - results

    EaReport:
      type: object
      properties:
        id:
          type: integer
        eventType:
          type: string
        symbol:
          type: string
        direction:
          type: ["string", "null"]
        setup:
          type: ["string", "null"]
        score:
          type: ["integer", "null"]
        entry:
          type: ["string", "null"]
        sl:
          type: ["string", "null"]
        tp1:
          type: ["string", "null"]
        tp2:
          type: ["string", "null"]
        tp3:
          type: ["string", "null"]
        closePrice:
          type: ["string", "null"]
        plDollars:
          type: ["string", "null"]
        closeReason:
          type: ["string", "null"]
        holdMinutes:
          type: ["integer", "null"]
        tpLevel:
          type: ["string", "null"]
        rsi:
          type: ["string", "null"]
        adx:
          type: ["string", "null"]
        atr:
          type: ["string", "null"]
        buyScore:
          type: ["integer", "null"]
        sellScore:
          type: ["integer", "null"]
        bullCount:
          type: ["integer", "null"]
        bearCount:
          type: ["integer", "null"]
        srStatus:
          type: ["string", "null"]
        mt5Ticket:
          type: ["integer", "null"]
        sessionOk:
          type: ["boolean", "null"]
        totalSignals:
          type: ["integer", "null"]
        winCount:
          type: ["integer", "null"]
        lossCount:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - eventType
        - symbol
        - createdAt

    EaReportListResponse:
      type: object
      properties:
        ok:
          type: boolean
        reports:
          type: array
          items:
            $ref: "#/components/schemas/EaReport"
      required:
        - ok
        - reports

    EaDirectionStat:
      type: object
      properties:
        direction:
          type: string
        total:
          type: integer
        winCount:
          type: integer
        winRate:
          type: number
      required:
        - direction
        - total
        - winCount
        - winRate

    EaSetupStat:
      type: object
      properties:
        setup:
          type: string
        total:
          type: integer
        winCount:
          type: integer
        winRate:
          type: number
        totalPl:
          type: number
      required:
        - setup
        - total
        - winCount
        - winRate
        - totalPl

    EaScoreRange:
      type: object
      properties:
        range:
          type: string
        count:
          type: integer
      required:
        - range
        - count

    EaPlPoint:
      type: object
      properties:
        time:
          type: string
        pl:
          type: number
        cumPl:
          type: number
      required:
        - time
        - pl
        - cumPl

    EaAnalytics:
      type: object
      properties:
        totalTrades:
          type: integer
        winCount:
          type: integer
        lossCount:
          type: integer
        winRate:
          type: number
        totalPl:
          type: number
        avgHoldMinutes:
          type: integer
        byDirection:
          type: array
          items:
            $ref: "#/components/schemas/EaDirectionStat"
        bySetup:
          type: array
          items:
            $ref: "#/components/schemas/EaSetupStat"
        scoreRanges:
          type: array
          items:
            $ref: "#/components/schemas/EaScoreRange"
        plHistory:
          type: array
          items:
            $ref: "#/components/schemas/EaPlPoint"
        recentClosed:
          type: array
          items:
            $ref: "#/components/schemas/EaReport"
        latestSnapshot:
          type: ["object", "null"]
          $ref: "#/components/schemas/EaReport"
        latestOpen:
          type: ["object", "null"]
          $ref: "#/components/schemas/EaReport"
      required:
        - totalTrades
        - winCount
        - lossCount
        - winRate
        - totalPl
        - avgHoldMinutes
        - byDirection
        - bySetup
        - scoreRanges
        - plHistory
        - recentClosed

    EaAnalyticsResponse:
      type: object
      properties:
        ok:
          type: boolean
        analytics:
          $ref: "#/components/schemas/EaAnalytics"
      required:
        - ok
        - analytics
